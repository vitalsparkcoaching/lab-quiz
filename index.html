* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --deep-wine: #522145;
  --wine: #6f3058;
  --pink: #c38f8f;
  --cream: #f1e4d4;
  --cream-dark: #e8d5c0;
  --cream-light: #faf5ef;
  --wine-10: rgba(111,48,88,0.08);
  --wine-20: rgba(111,48,88,0.15);
  --wine-30: rgba(82,33,69,0.25);
  --text-on-wine: #f1e4d4;
  --text-body: #3d1f35;
  --text-mid: #6a3d5c;
  --text-muted: #9a7088;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'BeVietnamPro', 'Helvetica Neue', sans-serif;
  background: var(--cream-light);
  color: var(--text-body);
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%;
  margin: 0;
  padding: 0;
}

/* HEADER */
.site-header {
  width: 100%;
  background: var(--deep-wine);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.site-header svg {
  height: 36px;
  width: auto;
}

/* HERO BAND */
.hero-band {
  width: 100%;
  background: linear-gradient(135deg, #522145 0%, #6f3058 45%, #8a4a6e 70%, #c38f8f 100%);
  padding: 52px 24px 48px;
  text-align: center;
}

.quiz-shell {
  width: 100%;
  max-width: 660px;
  padding: 0 16px 72px;
  margin: 0 auto;
  box-sizing: border-box;
  min-width: 0;
}

main {
  width: 100%;
  max-width: 660px;
  margin: 0 auto;
  padding: 0 16px 72px;
  box-sizing: border-box;
  display: block;
}

#app {
  width: 100%;
  box-sizing: border-box;
}

.screen {
  width: 100%;
  box-sizing: border-box;
}

/* MONO LABEL */
.mono-label {
  font-family: 'SometypeMono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink);
}

.mono-label-light {
  font-family: 'SometypeMono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(241,228,212,0.65);
}

/* CARDS */
.card {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--cream-dark);
  overflow: hidden;
  width: 100%;
  box-sizing: border-box;
}

/* INTRO */
.intro-hero {
  padding: 52px 40px 44px;
  text-align: center;
}

.intro-hero h1 {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 30px;
  line-height: 1.25;
  color: var(--deep-wine);
  margin: 14px 0 18px;
  letter-spacing: -0.01em;
}

.intro-hero h1 em {
  font-family: 'InstrumentSerif', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  color: var(--wine);
}

.intro-sub {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-mid);
  max-width: 460px;
  margin: 0 auto 32px;
}

.symptom-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 0 auto 28px;
  max-width: 480px;
}

.symptom-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--wine-10);
  border: 1px solid var(--wine-20);
  color: var(--wine);
  font-family: 'BeVietnamPro', sans-serif;
  font-size: 13px;
  line-height: 1;
  padding: 7px 13px;
  border-radius: 50px;
}

.symptom-chip-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--pink);
  flex-shrink: 0;
}

.intro-divider {
  width: 40px;
  height: 1px;
  background: var(--cream-dark);
  margin: 0 auto 22px;
}

.meta-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.meta-item {
  font-family: 'SometypeMono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 0 14px;
}

.meta-item + .meta-item {
  border-left: 1px solid var(--cream-dark);
}

.btn-primary {
  display: inline-block;
  background: var(--deep-wine);
  color: var(--cream);
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 16px 44px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  text-decoration: none;
}

.btn-primary:hover { background: var(--wine); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

/* PROGRESS */
.progress-wrap {
  margin: 32px 0 24px;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-track {
  height: 3px;
  background: var(--cream-dark);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--deep-wine), var(--wine));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* QUESTION */
.q-card-body {
  padding: 40px 36px 36px;
}

.q-number {
  margin-bottom: 12px;
}

.q-text {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 21px;
  line-height: 1.35;
  color: var(--deep-wine);
  margin-bottom: 28px;
  letter-spacing: -0.01em;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  background: var(--cream-light);
  border: 1.5px solid var(--cream-dark);
  border-radius: var(--radius-sm);
  padding: 15px 17px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}

.option-btn:hover {
  border-color: var(--pink);
  background: rgba(195,143,143,0.08);
}

.option-btn.selected {
  border-color: var(--wine);
  background: var(--wine-10);
}

.option-letter {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid var(--cream-dark);
  display: flex; align-items: center; justify-content: center;
  font-family: 'SometypeMono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  transition: all 0.15s;
  margin-top: 1px;
  flex-shrink: 0;
}

.option-btn.selected .option-letter {
  background: var(--wine);
  border-color: var(--wine);
  color: var(--cream);
}

.option-text {
  font-size: 15px;
  color: var(--text-body);
  line-height: 1.55;
  padding-top: 4px;
}

.nav-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 24px;
}

.btn-next {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--deep-wine);
  color: var(--cream);
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 14px 28px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0;
  pointer-events: none;
}

.btn-next.visible {
  opacity: 1;
  pointer-events: all;
}

.btn-next:hover { background: var(--wine); transform: translateY(-1px); }

/* LOADING */
.loading-card {
  padding: 72px 40px;
  text-align: center;
}

.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid var(--cream-dark);
  border-top-color: var(--wine);
  border-radius: 50%;
  margin: 0 auto 22px;
  animation: spin 0.9s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-card p {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.65;
}

.loading-card .loading-label {
  font-family: 'InstrumentSerif', Georgia, serif;
  font-style: italic;
  font-size: 18px;
  color: var(--wine);
  margin-bottom: 10px;
}

/* RESULT */
.result-header {
  background: linear-gradient(135deg, #522145 0%, #6f3058 60%, #8a4a6e 100%);
  padding: 40px 36px 36px;
  position: relative;
  overflow: hidden;
}

.result-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(195,143,143,0.12);
  pointer-events: none;
}

.result-header::after {
  content: '';
  position: absolute;
  bottom: -30px; left: 20px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(241,228,212,0.06);
  pointer-events: none;
}

.result-type-badge {
  display: inline-block;
  background: rgba(195,143,143,0.2);
  border: 1px solid rgba(195,143,143,0.35);
  color: var(--cream);
  font-family: 'SometypeMono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}

.result-lab-name {
  font-family: 'SometypeMono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.result-headline {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 24px;
  line-height: 1.3;
  color: var(--cream);
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.result-headline em {
  font-family: 'InstrumentSerif', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  color: var(--pink);
}

.result-body {
  padding: 34px 36px 36px;
}

.section-label {
  font-family: 'SometypeMono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.result-explanation {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-mid);
  margin-bottom: 28px;
}

.action-box {
  background: var(--wine-10);
  border: 1px solid var(--wine-20);
  border-left: 3px solid var(--wine);
  border-radius: var(--radius-sm);
  padding: 20px 22px;
  margin-bottom: 28px;
}

.action-box-label {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--wine);
  margin-bottom: 8px;
}

.action-box p {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-body);
}

/* PODCAST LINKS */
.podcast-links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.podcast-link {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--cream-light);
  border: 1px solid var(--cream-dark);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  text-decoration: none;
  transition: border-color 0.15s, background 0.15s;
}

.podcast-link:hover {
  border-color: var(--pink);
  background: rgba(195,143,143,0.06);
}

.podcast-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--deep-wine);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}

.podcast-icon svg { width: 14px; height: 14px; }

.podcast-meta { flex: 1; min-width: 0; }

.podcast-show {
  font-family: 'SometypeMono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.podcast-title {
  font-family: 'BeVietnamPro', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-body);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.podcast-arrow {
  font-size: 14px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* CTA */
.cta-section {
  background: var(--cream);
  border-top: 1px solid var(--cream-dark);
  padding: 32px 36px 36px;
  text-align: center;
}

.cta-headline {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--deep-wine);
  margin-bottom: 10px;
  line-height: 1.3;
}

.cta-pre {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 22px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.btn-cta {
  display: inline-block;
  background: var(--deep-wine);
  color: var(--cream);
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 18px 36px;
  border-radius: 50px;
  text-decoration: none;
  transition: all 0.2s;
  margin-bottom: 14px;
  display: block;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.3;
}

.btn-cta:hover { background: var(--wine); transform: translateY(-1px); }

.cta-fine {
  font-family: 'SometypeMono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-top: 12px;
}

.retake-btn {
  display: inline-block;
  background: none;
  border: 1px solid var(--cream-dark);
  color: var(--text-muted);
  font-family: 'BeVietnamPro', sans-serif;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.15s;
}

.retake-btn:hover { border-color: var(--pink); color: var(--wine); }

/* DIVIDER */
.result-divider {
  height: 1px;
  background: var(--cream-dark);
  margin: 0 0 28px;
}

/* TRANSITION */
.screen { animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 520px) {
  .intro-hero { padding: 32px 22px 30px; }
  .intro-hero h1 { font-size: 25px; }
  .q-card-body { padding: 28px 20px 24px; }
  .q-text { font-size: 18px; }
  .result-header { padding: 30px 22px 28px; }
  .result-headline { font-size: 20px; }
  .result-body { padding: 26px 22px 28px; }
  .cta-section { padding: 26px 22px 30px; }
  .btn-cta { font-size: 12px; padding: 16px 24px; }
  .meta-row { gap: 8px; }
  .meta-item { padding: 0 10px; font-size: 10px; }
}
</style>

    podcasts: [
      { title: "10 Reasons To Test Your Gut If You Want to Lose Weight", url: "https://podcasts.apple.com/us/podcast/vanessa-g-fitcast/id1552689596?i=1000717163280" },
      { title: "Ep. 253: Why You Need a GI-MAP", url: "https://podcasts.apple.com/us/podcast/ep-253-why-you-need-a-gi-map/id1552689596?i=1000740206255" }
    ]
  }
};

function getResult(answers) {
  const counts = { gut: 0, hormone: 0, immune: 0 };
  answers.forEach(a => {
    if (a === 0) counts.gut++;
    else if (a === 1) counts.hormone++;
    else if (a === 2) counts.immune++;
    else { counts.gut++; counts.hormone++; counts.immune++; }
  });
  if (counts.gut >= counts.hormone && counts.gut >= counts.immune) return 'gut';
  if (counts.hormone > counts.gut && counts.hormone >= counts.immune) return 'hormone';
  return 'immune';
}

let screen = 'intro';
let currentQ = 0;
let answers = [];

const playIcon = `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="7" stroke="#f1e4d4" stroke-width="1.2"/><polygon points="6.5,5 12,8 6.5,11" fill="#f1e4d4"/></svg>`;

function render() {
  const app = document.getElementById('app');
  if (screen === 'intro') {
    app.innerHTML = renderIntro();
  } else if (screen === 'question') {
    app.innerHTML = renderQuestion();
    app.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.addEventListener('click', () => selectOption(i));
    });
    app.querySelector('#btn-next').addEventListener('click', nextQuestion);
  } else if (screen === 'loading') {
    app.innerHTML = renderLoading();
    setTimeout(() => { screen = 'result'; render(); }, 2400);
  } else if (screen === 'result') {
    const key = getResult(answers);
    app.innerHTML = renderResult(RESULTS[key]);
    app.querySelector('#retake-btn').addEventListener('click', () => {
      screen = 'intro'; currentQ = 0; answers = []; render();
    });
  }
}

function renderIntro() {
  return `<div class="screen" style="padding-top: 36px;width:100%;box-sizing:border-box;">
    <div class="card intro-hero">
      <div class="mono-label">Free 2-Minute Quiz</div>
      <h1>Which functional lab test should you start with? — <em>The 2-Minute Quiz</em></h1>
      <p class="intro-sub">Bloating that won't quit. Hormones that feel completely off. Exhaustion no amount of sleep fixes. Weight that won't budge no matter what you do. If this sounds familiar — your body isn't broken. It's just asking for the right test. This quiz takes 2 minutes and tells you exactly which functional lab test to start with — so you can finally stop guessing and start getting real answers.</p>
      <div class="symptom-chips">
        <span class="symptom-chip"><span class="symptom-chip-dot"></span>Bloating &amp; gut issues</span>
        <span class="symptom-chip"><span class="symptom-chip-dot"></span>Hormone imbalances</span>
        <span class="symptom-chip"><span class="symptom-chip-dot"></span>Unexplained weight gain</span>
        <span class="symptom-chip"><span class="symptom-chip-dot"></span>Chronic fatigue</span>
        <span class="symptom-chip"><span class="symptom-chip-dot"></span>Brain fog</span>
      </div>
      <div class="meta-row">
        <span class="meta-item">5 questions</span>
        <span class="meta-item">~2 minutes</span>
        <span class="meta-item">No email required</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Find My Starting Point</button>
    </div>
  </div>`;
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  const sel = answers[currentQ] !== undefined ? answers[currentQ] : -1;
  return `<div class="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="mono-label" style="color:var(--text-muted);">Question ${currentQ + 1} of ${QUESTIONS.length}</span>
        <span class="mono-label" style="color:var(--wine);">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="q-card-body">
        <div class="q-number mono-label">Question ${currentQ + 1}</div>
        <h2 class="q-text">${q.text}</h2>
        <div class="options-list">
          ${q.options.map((opt, i) => `
            <button class="option-btn ${sel === i ? 'selected' : ''}" data-idx="${i}">
              <span class="option-letter">${opt.letter}</span>
              <span class="option-text">${opt.text}</span>
            </button>
          `).join('')}
        </div>
        <div class="nav-row">
          <button class="btn-next ${sel >= 0 ? 'visible' : ''}" id="btn-next">
            ${currentQ < QUESTIONS.length - 1 ? 'Next question &rarr;' : 'See my results &rarr;'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderLoading() {
  return `<div class="card screen" style="margin-top:36px;width:100%;box-sizing:border-box;">
    <div class="loading-card">
      <div class="spinner"></div>
      <p class="loading-label">Analyzing your answers…</p>
      <p>Matching your symptom pattern to the right<br>functional lab recommendation.</p>
    </div>
  </div>`;
}

function renderResult(r) {
  return `<div class="card screen" style="margin-top:36px;width:100%;box-sizing:border-box;">
    <div class="result-header">
      <div class="result-type-badge">${r.badge}</div>
      <div class="result-lab-name">${r.labName}</div>
      <h2 class="result-headline">${r.headline}</h2>
    </div>
    <div class="result-body">
      <div class="section-label">Here's what's likely going on</div>
      <p class="result-explanation">${r.explanation}</p>
      <div class="result-divider"></div>
      <div class="action-box">
        <div class="action-box-label">Your action this week</div>
        <p>${r.action}</p>
      </div>
      <div class="section-label">Listen to these episodes</div>
      <div class="podcast-links">
        ${r.podcasts.map(p => `
          <a href="${p.url}" target="_blank" class="podcast-link">
            <div class="podcast-icon">${playIcon}</div>
            <div class="podcast-meta">
              <div class="podcast-show">The Vanessa G Fitcast</div>
              <div class="podcast-title">${p.title}</div>
            </div>
            <span class="podcast-arrow">&rarr;</span>
          </a>
        `).join('')}
      </div>
    </div>
    <div class="cta-section">
      <h3 class="cta-headline">Want to know exactly what your body needs?</h3>
      <p class="cta-pre">Book a free consultation call and we'll walk through your symptoms together, explain what testing would look like for you specifically, and map out a clear path forward.</p>
      <a href="https://vitalsparkcoaching.com/info-quiz" target="_blank" class="btn-cta">Book Your Free Functional Health Consultation Call</a>
      <p class="cta-fine">No commitment &nbsp;·&nbsp; No pushy sales &nbsp;·&nbsp; Just clarity</p>
      <br>
      <button class="retake-btn" id="retake-btn">&larr; Retake the quiz</button>
    </div>
  </div>`;
}

function startQuiz() {
  screen = 'question'; currentQ = 0; render();
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    const isSelected = i === idx;
    btn.classList.toggle('selected', isSelected);
    const letter = btn.querySelector('.option-letter');
    letter.style.background = isSelected ? 'var(--wine)' : '';
    letter.style.borderColor = isSelected ? 'var(--wine)' : '';
    letter.style.color = isSelected ? 'var(--cream)' : '';
  });
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++; render();
  } else {
    screen = 'loading'; render();
  }
}

render();
</script>
</body>
</html>
